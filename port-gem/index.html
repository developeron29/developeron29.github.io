<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayush Narula - 3D Portfolio</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #f3f4f6;
    font-family: system-ui;
}

/* ---------------- LOADER ---------------- */
#loader {
    position: fixed;
    inset: 0;
    background: #f3f4f6;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    font-size: 22px;
    color: #4b5563;
}

/* ---------------- WEBGL (HIDDEN INITIALLY) ---------------- */
#webgl-container {
    position: fixed;
    inset: 0;
    opacity: 0;              /* 🔥 hidden until ready */
    transition: opacity 0.8s ease;
}
</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
    Loading 3D Experience...
    <div id="progress">0%</div>
</div>

<!-- WEBGL -->
<div id="webgl-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const loaderEl = document.getElementById("loader");
const progressEl = document.getElementById("progress");
const webglEl = document.getElementById("webgl-container");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    100
);
camera.position.set(0, 1.5, 6);

const renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
webglEl.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* ---------------- LIGHT ---------------- */
scene.add(new THREE.AmbientLight(0xffffff, 1.2));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(-3, 2, 2);
scene.add(light);

/* ---------------- LOADING MANAGER ---------------- */
const manager = new THREE.LoadingManager();

manager.onProgress = (_, loaded, total) => {
    const percent = Math.round((loaded / total) * 100);
    progressEl.textContent = percent + "%";
};

manager.onLoad = () => {
    progressEl.textContent = "100%";

    // 🔥 reveal everything ONLY when fully ready
    loaderEl.style.display = "none";
    webglEl.style.opacity = "1";
};

/* ---------------- LOADERS ---------------- */
const gltfLoader = new GLTFLoader(manager);

let city;
let mixer;

/* MODEL 1 */
gltfLoader.load("globe.glb", (gltf) => {
    city = gltf.scene;
    city.position.set(0, 0, -2);
    city.scale.set(2, 2, 2);
    scene.add(city);
});

/* MODEL 2 */
gltfLoader.load("waving.glb", (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.012, 0.012, 0.012);
    model.position.set(4.2, -1.2, 0);
    scene.add(model);

    mixer = new THREE.AnimationMixer(model);

    if (gltf.animations.length > 0) {
        mixer.clipAction(gltf.animations[0]).play();
    }
});

/* ---------------- ANIMATE ---------------- */
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if (mixer) mixer.update(delta);
    if (city) city.rotation.y += 0.005;

    controls.update();
    renderer.render(scene, camera);
}

animate();

/* ---------------- RESIZE ---------------- */
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
