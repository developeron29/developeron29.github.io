<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Loader Fix</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #f3f4f6;
        font-family: system-ui;
    }

    /* HARD FORCED LOADER */
    #loader {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw;
        height: 100vh;
        background: #f3f4f6;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 2147483647 !important; /* MAX INT Z-INDEX */
        font-size: 22px;
        color: #333;
    }

    #loading-progress {
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.7;
    }

    #webgl-container {
        position: fixed;
        inset: 0;
        z-index: 1;
    }

    canvas {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: block;
    }

    .hero-text {
        position: absolute;
        top: 50%;
        left: 8%;
        transform: translateY(-50%);
        z-index: 5;
        max-width: 500px;
        background: rgba(255,255,255,0.8);
        padding: 30px;
        border-radius: 20px;
    }
</style>
</head>

<body>

<!-- IMPORTANT: loader must be FIRST in DOM -->
<div id="loader">
    Loading Experience...
    <div id="loading-progress">0%</div>
</div>

<div class="hero-text">
    <h1>Ayush Narula</h1>
    <p>3D + AI Developer</p>
</div>

<div id="webgl-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ---------------- DEBUG: prove JS runs ---------------- */
console.log("JS STARTED");

/* ---------------- LOADER ELEMENTS ---------------- */
const loaderEl = document.getElementById("loader");
const progressEl = document.getElementById("loading-progress");

/* If loader doesn't exist -> stop immediately */
if (!loaderEl) {
    alert("Loader not found in DOM");
}

/* ---------------- SCENE ---------------- */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
document.getElementById("webgl-container").appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

/* ---------------- LIGHT ---------------- */
scene.add(new THREE.AmbientLight(0xffffff, 1.2));

/* ---------------- LOADING MANAGER ---------------- */
const manager = new THREE.LoadingManager();

manager.onProgress = (_, loaded, total) => {
    const pct = Math.round((loaded / total) * 100);
    progressEl.textContent = pct + "%";
};

manager.onLoad = () => {
    progressEl.textContent = "100%";

    console.log("ALL LOADED");

    setTimeout(() => {
        loaderEl.style.opacity = "0";
        setTimeout(() => loaderEl.remove(), 500);
    }, 300);
};

/* ---------------- LOADER ---------------- */
const gltf = new GLTFLoader(manager);

let city;

/* MODEL 1 */
gltf.load("globe.glb", (g) => {
    city = g.scene;
    city.scale.set(2,2,2);
    city.position.z = -2;
    scene.add(city);
});

/* MODEL 2 */
gltf.load("waving.glb", (g) => {
    const model = g.scene;
    model.scale.set(0.012,0.012,0.012);
    model.position.set(4.2,-1.2,0);
    scene.add(model);
});

/* ---------------- LOOP ---------------- */
function animate() {
    requestAnimationFrame(animate);
    if (city) city.rotation.y += 0.005;
    controls.update();
    renderer.render(scene, camera);
}
animate();

/* ---------------- RESIZE ---------------- */
addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
