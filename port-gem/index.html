<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayush Narula - 3D & AI Developer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f3f4f6; font-family: 'Inter', system-ui, sans-serif; }
        
        /* Loading Screen Style */
        #loader {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #f3f4f6; display: flex; justify-content: center;
            align-items: center; z-index: 100; font-size: 1.5rem; color: #4b5563;
        }

        .hero-text {
            position: absolute; top: 50%; left: 8%; transform: translateY(-50%); z-index: 10;
            max-width: 500px; pointer-events: none; background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px); padding: 40px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 1);
        }
        
        h1 { font-size: 3.5rem; margin: 0 0 15px 0; line-height: 1.1; background: linear-gradient(90deg, #059669, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.4rem; color: #4b5563; margin: 0; line-height: 1.5; }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    </style>
</head>
<body>

    <div id="loader">Loading 3D Experience...</div>

    <div class="hero-text">
        <h1>Hi! This is Ayush Narula,</h1>
        <p>welcome to my website! I am a 3D and AI developer. </p>
        <p>I am an artist too.</p>
    </div>

    <div id="webgl-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xf3f4f6, 0.015);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const characterX = 4.2;
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;
        controls.target.set(1.5, 0.5, 0);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const fillLight = new THREE.DirectionalLight(0xffffff, 1.0);
        fillLight.position.set(-3, 2, 2);
        scene.add(fillLight);

        // Loader Manager to handle the loading screen
        const loadingManager = new THREE.LoadingManager();
        loadingManager.onLoad = () => {
            document.getElementById('loader').style.display = 'none';
        };

        const gltfLoader = new GLTFLoader(loadingManager);
        let mixer, city;

        // Load City
        gltfLoader.load('globe.glb', (gltf) => {
            city = gltf.scene;
            city.position.set(0, 0, -2);
            city.scale.set(2, 2, 2);
            scene.add(city);
        });

        // Load Character (GLB)
        gltfLoader.load('waving.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.012, 0.012, 0.012);
            model.position.set(characterX, -1.2, 0);
            model.rotation.y = -Math.PI / 6;
            scene.add(model);

            mixer = new THREE.AnimationMixer(model);
            if (gltf.animations.length > 0) {
                mixer.clipAction(gltf.animations[0]).play();
            }
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            if (city) city.rotation.y += 0.005;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
